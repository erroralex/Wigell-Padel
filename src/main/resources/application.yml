server:
  port: 8584

spring:
  application:
    name: wigell-padel

  datasource:
    url: jdbc:mysql://localhost:3306/wigell_padel_db?createDatabaseIfNotExist=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  # Keycloak-integration (Krävs av SharedSecurityConfig i shared-lib)
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/wigell-realm

  boot:
    admin:
      client:
        url: http://localhost:8081

# Valutatjänstens URL
wigell:
  currency:
    url: http://localhost:8080/currency

# Actuator-konfiguration (Krav för Dashboard)
management:
  endpoints:
    web:
      exposure:
        include: health, info
  info:
    env:
      enabled: true

logging:
  level:
    root: INFO
    com.nilsson.padel: DEBUG
    com.groupc.shared: DEBUG