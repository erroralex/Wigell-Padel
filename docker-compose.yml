version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: wigell-padel-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wigell_padel_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./src/main/resources/create.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  db_data:
    name: wigell_padel_db_data